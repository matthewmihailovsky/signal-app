<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIGNAL — скрытый слой города</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c12;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }
        .ui-overlay {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }
        .signal-panel {
            background: rgba(15, 17, 23, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            display: inline-flex;
            gap: 16px;
            align-items: center;
            pointer-events: auto;
            border: 1px solid rgba(74, 255, 181, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .signal-info {
            color: white;
        }
        .signal-name {
            font-weight: bold;
            font-size: 1rem;
        }
        .signal-distance {
            font-size: 0.75rem;
            color: #4affb5;
        }
        button {
            background: #4affb5;
            border: none;
            color: #0a0c12;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        .user-greeting {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 20;
            pointer-events: none;
            color: #eef2ff;
        }
        .menu-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f2a3a;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 12px black;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: #0f1117ec;
            backdrop-filter: blur(20px);
            z-index: 30;
            transition: 0.3s;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-left: 1px solid #2e3548;
        }
        .side-menu.open {
            right: 0;
        }
        .side-menu a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 16px;
        }
        .close-menu {
            position: absolute;
            top: 16px;
            left: 16px;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        // Импорт Firebase будет внутри модуля
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Конфигурация Firebase (ЗАМЕНИТЕ НА ВАШУ)
        const firebaseConfig = {
            apiKey: "AIzaSyAvqd3lQwvRecGNykyBncl-EKc0I5891UA",
            authDomain: "signal-game-27495.firebaseapp.com",
            projectId: "signal-game-27495",
            storageBucket: "signal-game-27495.firebasestorage.app",
            messagingSenderId: "706423536737",
            appId: "1:706423536737:web:040edb44f5574617bb7e20"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // --- Telegram WebApp ---
        let tg = window.Telegram?.WebApp;
        let userData = { id: null, name: "Исследователь" };
        if (tg) {
            tg.ready();
            if (tg.initDataUnsafe?.user) {
                userData.id = tg.initDataUnsafe.user.id;
                userData.name = tg.initDataUnsafe.user.first_name || "Игрок";
            }
        } else {
            // Для локального теста
            userData.id = Date.now();
            userData.name = "Тестовый";
        }
        document.getElementById("greeting").innerText = `👋 ${userData.name}`;
        
        // --- Карта и GPS ---
        let map = L.map('map').setView([55.751244, 37.618423], 13); // Москва
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB'
        }).addTo(map);
        
        let userMarker = null;
        let currentSignalMarkers = [];
        let selectedSignal = null;
        
        // Функция получения сигналов из Firestore (позже)
        async function loadSignals() {
            // Пока тестовые данные
            const demoSignals = [
                { id: "sig1", name: "Старый телеком узел", lat: 55.7482, lng: 37.6055, rewardXP: 150, radius: 50 },
                { id: "sig2", name: "Тайный клуб", lat: 55.7558, lng: 37.6176, rewardXP: 250, radius: 40 }
            ];
            demoSignals.forEach(sig => {
                const marker = L.marker([sig.lat, sig.lng]).addTo(map);
                marker.bindPopup(`<b>${sig.name}</b><br>+${sig.rewardXP} XP<button class="claim-signal" data-id="${sig.id}">Принять</button>`);
                marker.on('popupopen', () => {
                    document.querySelector('.claim-signal')?.addEventListener('click', () => claimSignal(sig.id, sig.rewardXP));
                });
                currentSignalMarkers.push(marker);
            });
        }
        
        async function claimSignal(signalId, xpReward) {
            if (!userData.id) return;
            const userRef = doc(db, "users", userData.id.toString());
            const userSnap = await getDoc(userRef);
            let currentXP = 0, level = 1;
            if (userSnap.exists()) {
                currentXP = userSnap.data().xp || 0;
                level = userSnap.data().level || 1;
            }
            const newXP = currentXP + xpReward;
            let newLevel = level;
            let xpNeeded = level * 1000;
            if (newXP >= xpNeeded) {
                newLevel = level + 1;
            }
            await setDoc(userRef, {
                name: userData.name,
                xp: newXP,
                level: newLevel,
                signalsTaken: arrayUnion(signalId),
                lastSeen: new Date()
            }, { merge: true });
            alert(`Сигнал принят! +${xpReward} XP. Уровень: ${newLevel}`);
            // удалить маркер
            const markerToRemove = currentSignalMarkers.find(m => m.getPopup()?.getContent()?.includes(signalId));
            if (markerToRemove) map.removeLayer(markerToRemove);
        }
        
        // Геолокация
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([latitude, longitude], { icon: L.divIcon({ className: 'custom-div-icon', html: '📍', iconSize: [20,20] }) }).addTo(map);
                    map.setView([latitude, longitude], 15);
                },
                (err) => console.warn(err),
                { enableHighAccuracy: true }
            );
        }
        
        // Меню (профиль, инвентарь — заглушки)
        document.getElementById("menuBtn").addEventListener("click", () => {
            document.getElementById("sideMenu").classList.add("open");
        });
        document.getElementById("closeMenu").addEventListener("click", () => {
            document.getElementById("sideMenu").classList.remove("open");
        });
        document.getElementById("profileLink").addEventListener("click", () => {
            alert("Профиль: загрузка из Firebase...");
        });
        
        loadSignals();
    </script>
</head>
<body>
    <div id="map"></div>
    <div class="user-greeting" id="greeting">👤 Загрузка...</div>
    <div class="menu-btn" id="menuBtn">☰</div>
    <div class="side-menu" id="sideMenu">
        <div class="close-menu" id="closeMenu">✖️</div>
        <a href="#" id="profileLink">👤 Профиль</a>
        <a href="#">🎒 Инвентарь</a>
        <a href="#">🏆 Рейтинг</a>
        <a href="#">⚙️ Настройки</a>
    </div>
    
    <!-- Telegram WebApp скрипт -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
