<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIGNAL — скрытый слой Минска</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Карта занимает весь экран */
        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        /* Основной контейнер для всех UI-элементов поверх карты */
        .app-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* Верхняя панель с приветствием */
        .top-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        .user-greeting {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #eef2ff;
            font-weight: 500;
        }
        .menu-btn {
            background: #1f2a3a;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 4px 12px black;
        }

        /* Боковое меню (бургер) – теперь полноценная навигация */
        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100%;
            background: #0f1117ee;
            backdrop-filter: blur(24px);
            z-index: 100;
            transition: 0.3s;
            padding: 60px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-left: 1px solid #2e3548;
            pointer-events: auto;
            overflow-y: auto;
        }
        .side-menu.open {
            right: 0;
        }
        .close-menu {
            position: absolute;
            top: 16px;
            left: 16px;
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
        }
        .menu-item {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 12px 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .menu-item.active {
            background: #4affb5;
            color: #0a0c12;
        }
        .menu-item .emoji {
            font-size: 1.4rem;
        }

        /* Контентная область для экранов (кроме карты) */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f1117;
            z-index: 50;
            overflow-y: auto;
            padding: 20px 16px 80px;
            transition: transform 0.3s;
            transform: translateX(100%);
            pointer-events: auto;
        }
        .screen.active-screen {
            transform: translateX(0);
        }
        .screen-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2f3f;
        }
        .back-btn {
            background: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
        }
        .screen-title {
            font-size: 1.6rem;
            font-weight: bold;
        }

        /* Карточки и элементы */
        .card {
            background: #171a23;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .signal-marker-popup {
            min-width: 200px;
        }
        .signal-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .type-weak { background: #6c8eff; }
        .type-strong { background: #ffb347; }
        .type-encrypted { background: #c084fc; }
        .type-black { background: #1e1e2f; color: #ff4d4d; border: 1px solid #ff4d4d; }

        .reward-badge {
            background: #4affb520;
            border-radius: 20px;
            padding: 6px 12px;
            display: inline-block;
            font-size: 0.8rem;
        }

        button {
            background: #2a2f3f;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        button.primary {
            background: #4affb5;
            color: #0a0c12;
        }

        /* Инвентарь сетка */
        .items-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .item {
            background: #1e2330;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            flex: 1 0 80px;
        }

        .ranking-list {
            list-style: none;
        }
        .ranking-list li {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #262c3c;
        }

        .faction-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .faction-btn {
            background: #1e2330;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .faction-btn.selected {
            background: #4affb5;
            color: #0a0c12;
        }

        /* прогресс-бары */
        .xp-bar {
            background: #262c3c;
            border-radius: 30px;
            height: 12px;
            margin: 8px 0;
            overflow: hidden;
        }
        .xp-fill {
            background: #4affb5;
            width: 0%;
            height: 100%;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove, deleteDoc, GeoPoint, onSnapshot, query, where, orderBy, limit, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // ⚠️ ВСТАВЬТЕ ВАШИ ДАННЫЕ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAvqd3lQwvRecGNykyBncl-EKc0I5891UA",
            authDomain: "signal-game-27495.firebaseapp.com",
            projectId: "signal-game-27495",
            storageBucket: "signal-game-27495.firebasestorage.app",
            messagingSenderId: "706423536737",
            appId: "1:706423536737:web:040edb44f5574617bb7e20"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // --- Telegram WebApp ---
        let tg = window.Telegram?.WebApp;
        let userData = { id: null, name: "Исследователь" };
        if (tg) {
            tg.ready();
            if (tg.initDataUnsafe?.user) {
                userData.id = tg.initDataUnsafe.user.id;
                userData.name = tg.initDataUnsafe.user.first_name || "Игрок";
            }
        } else {
            userData.id = "test_" + Date.now();
            userData.name = "Тестовый";
        }
        
        // --- Глобальные переменные ---
        let map;
        let userMarker = null;
        let userLocation = null;
        let currentSignalMarkers = [];
        let unsubscribeSignals = null;
        
        // --- Инициализация карты (Минск) ---
        function initMap() {
            map = L.map('map').setView([53.9045, 27.5615], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB'
            }).addTo(map);
            
            // Геолокация
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        if (userMarker) map.removeLayer(userMarker);
                        userMarker = L.marker([userLocation.lat, userLocation.lng], {
                            icon: L.divIcon({ className: 'custom-div-icon', html: '📍', iconSize: [24,24] })
                        }).addTo(map);
                        map.setView([userLocation.lat, userLocation.lng], 15);
                        updateDistancesOnMarkers();
                    },
                    (err) => console.warn(err),
                    { enableHighAccuracy: true }
                );
            }
        }
        
        // Функция обновления расстояний в попапах (опционально)
        function updateDistancesOnMarkers() {
            if (!userLocation) return;
            currentSignalMarkers.forEach(marker => {
                const signal = marker.signalData;
                if (signal && marker.getPopup()) {
                    const distance = getDistance(userLocation.lat, userLocation.lng, signal.location.latitude, signal.location.longitude);
                    const content = getPopupContent(signal, distance);
                    marker.setPopupContent(content);
                }
            });
        }
        
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2 - lat1) * Math.PI/180;
            const Δλ = (lon2 - lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        function getPopupContent(signal, distance) {
            const typeClass = `type-${signal.type}`;
            return `
                <div style="min-width:200px">
                    <div><span class="signal-type ${typeClass}">${signal.type.toUpperCase()}</span> <strong>${signal.name}</strong></div>
                    <div>📍 ${Math.round(distance)} м</div>
                    <div>🎁 ${signal.rewardXP} XP, ${signal.rewardItem || 'предмет'}</div>
                    <button class="claim-signal-btn" data-id="${signal.id}" data-xp="${signal.rewardXP}" data-lat="${signal.location.latitude}" data-lng="${signal.location.longitude}">Сканировать</button>
                </div>
            `;
        }
        
        // Подписка на сигналы в реальном времени
        function subscribeSignals() {
            if (unsubscribeSignals) unsubscribeSignals();
            const q = query(collection(db, "signals"), where("claimed", "==", false));
            unsubscribeSignals = onSnapshot(q, (snapshot) => {
                // Удаляем старые маркеры
                currentSignalMarkers.forEach(m => map.removeLayer(m));
                currentSignalMarkers = [];
                snapshot.forEach(docSnap => {
                    const signal = { id: docSnap.id, ...docSnap.data() };
                    if (signal.claimed) return;
                    if (!signal.location || !signal.location.latitude) return;
                    const marker = L.marker([signal.location.latitude, signal.location.longitude]).addTo(map);
                    marker.signalData = signal;
                    let distance = 0;
                    if (userLocation) {
                        distance = getDistance(userLocation.lat, userLocation.lng, signal.location.latitude, signal.location.longitude);
                    }
                    marker.bindPopup(getPopupContent(signal, distance));
                    marker.on('popupopen', () => {
                        const btn = document.querySelector('.claim-signal-btn');
                        if (btn && !btn.hasListener) {
                            btn.hasListener = true;
                            btn.addEventListener('click', async (e) => {
                                const signalId = btn.getAttribute('data-id');
                                const rewardXP = parseInt(btn.getAttribute('data-xp'));
                                const sLat = parseFloat(btn.getAttribute('data-lat'));
                                const sLng = parseFloat(btn.getAttribute('data-lng'));
                                await claimSignal(signalId, rewardXP, sLat, sLng);
                            });
                        }
                    });
                    currentSignalMarkers.push(marker);
                });
            });
        }
        
        // Принятие сигнала с удалением и обновлением профиля
        async function claimSignal(signalId, rewardXP, signalLat, signalLng) {
            if (!userLocation) {
                alert("Включите геолокацию");
                return;
            }
            const distance = getDistance(userLocation.lat, userLocation.lng, signalLat, signalLng);
            if (distance > 50) {
                alert(`Вы слишком далеко (${Math.round(distance)} м). Подойдите ближе.`);
                return;
            }
            try {
                await runTransaction(db, async (transaction) => {
                    const signalRef = doc(db, "signals", signalId);
                    const signalSnap = await transaction.get(signalRef);
                    if (!signalSnap.exists() || signalSnap.data().claimed === true) {
                        throw new Error("Сигнал уже активирован");
                    }
                    transaction.update(signalRef, { claimed: true });
                    
                    const userRef = doc(db, "users", userData.id.toString());
                    const userSnap = await transaction.get(userRef);
                    let currentXP = userSnap.exists() ? userSnap.data().xp : 0;
                    let level = userSnap.exists() ? userSnap.data().level : 1;
                    let newXP = currentXP + rewardXP;
                    let newLevel = level;
                    if (newXP >= level * 1000) {
                        newLevel = level + 1;
                    }
                    transaction.set(userRef, {
                        name: userData.name,
                        xp: newXP,
                        level: newLevel,
                        signalsTaken: arrayUnion(signalId),
                        lastSeen: new Date(),
                        inventory: userSnap.exists() ? userSnap.data().inventory || [] : []
                    }, { merge: true });
                });
                alert(`Сигнал принят! +${rewardXP} XP`);
                // Обновим профиль на UI (позже)
                loadUserProfile();
            } catch (error) {
                alert(error.message);
            }
        }
        
        // Загрузка данных пользователя для отображения в профиле и инвентаре
        async function loadUserProfile() {
            const userRef = doc(db, "users", userData.id.toString());
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById("greeting").innerText = `👋 ${data.name || userData.name}  Lvl ${data.level || 1}`;
                // Обновим экран профиля, если он активен
                renderProfileScreen(data);
                renderInventoryScreen(data);
            } else {
                // Создаем пустого пользователя
                await setDoc(userRef, {
                    name: userData.name,
                    xp: 0,
                    level: 1,
                    signalsTaken: [],
                    inventory: [],
                    faction: null,
                    friends: [],
                    achievements: [],
                    collections: []
                });
                loadUserProfile();
            }
        }
        
        // --- Отрисовка экранов ---
        function renderProfileScreen(data) {
            const profileDiv = document.getElementById("profileContent");
            if (!profileDiv) return;
            const level = data.level || 1;
            const xp = data.xp || 0;
            const xpNeeded = level * 1000;
            const percent = (xp / xpNeeded) * 100;
            profileDiv.innerHTML = `
                <div class="card">
                    <div><strong>${data.name}</strong> | Уровень ${level}</div>
                    <div class="xp-bar"><div class="xp-fill" style="width:${percent}%"></div></div>
                    <div>${xp} / ${xpNeeded} XP</div>
                </div>
                <div class="card">
                    <div>Фракция: ${data.faction || "не выбрана"}</div>
                    <div>Принято сигналов: ${data.signalsTaken?.length || 0}</div>
                </div>
            `;
        }
        
        function renderInventoryScreen(data) {
            const invDiv = document.getElementById("inventoryContent");
            if (!invDiv) return;
            const inventory = data.inventory || [];
            if (inventory.length === 0) {
                invDiv.innerHTML = "<div class='card'>Пусто. Сканируйте сигналы!</div>";
                return;
            }
            let html = '<div class="items-grid">';
            inventory.forEach(item => {
                html += `<div class="item">${item.name}<br>×${item.count || 1}</div>`;
            });
            html += '</div>';
            invDiv.innerHTML = html;
        }
        
        // --- Навигация между экранами ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }
        
        // --- Инициализация интерфейса ---
        function initUI() {
            // Боковое меню
            const menuBtn = document.getElementById("menuBtn");
            const sideMenu = document.getElementById("sideMenu");
            const closeMenu = document.getElementById("closeMenu");
            menuBtn.addEventListener("click", () => sideMenu.classList.add("open"));
            closeMenu.addEventListener("click", () => sideMenu.classList.remove("open"));
            
            // Обработчики пунктов меню
            document.getElementById("menuProfile").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("profileScreen"); loadUserProfile(); });
            document.getElementById("menuInventory").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("inventoryScreen"); loadUserProfile(); });
            document.getElementById("menuFactions").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("factionsScreen"); });
            document.getElementById("menuRating").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("ratingScreen"); loadRating(); });
            document.getElementById("menuQuests").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("questsScreen"); });
            document.getElementById("menuCollections").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("collectionsScreen"); });
            document.getElementById("menuLore").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("loreScreen"); });
            document.getElementById("menuEvents").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("eventsScreen"); });
            document.getElementById("menuShop").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("shopScreen"); });
            document.getElementById("menuSettings").addEventListener("click", () => { sideMenu.classList.remove("open"); showScreen("settingsScreen"); });
            
            // Кнопки "Назад" на экранах
            document.querySelectorAll('.back-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
                });
            });
        }
        
        async function loadRating() {
            const q = query(collection(db, "users"), orderBy("xp", "desc"), limit(50));
            const snap = await getDocs(q);
            const ratingDiv = document.getElementById("ratingList");
            let html = '<ul class="ranking-list">';
            let pos = 1;
            snap.forEach(doc => {
                const user = doc.data();
                html += `<li><span>${pos}. ${user.name}</span><span>Lvl ${user.level} | ${user.xp} XP</span></li>`;
                pos++;
            });
            html += '</ul>';
            ratingDiv.innerHTML = html;
        }
        
        // Заглушки для остальных экранов (можно наполнить позже)
        function fillPlaceholders() {
            document.getElementById("factionsContent").innerHTML = `<div class="card">Выбери фракцию: Искатели, Телефоны, Аналитики, Культуры, Торговцы</div>`;
            document.getElementById("questsContent").innerHTML = `<div class="card">Ежедневно: принять 3 сигнала → +200 XP</div>`;
            document.getElementById("collectionsContent").innerHTML = `<div class="card">Фрагменты: Тайна Хитровки (0/3), Эхо Арбата (1/5)</div>`;
            document.getElementById("loreContent").innerHTML = `<div class="card">Город помнит всё. Каждый сигнал — часть истории.</div>`;
            document.getElementById("eventsContent").innerHTML = `<div class="card">Ночной рейд сегодня 22:00<br>Секретный дроп завтра 18:00</div>`;
            document.getElementById("shopContent").innerHTML = `<div class="card">Бустер опыта 149₽<br>Премиум доступ 499₽/мес</div>`;
            document.getElementById("settingsContent").innerHTML = `<div class="card">Уведомления, язык, выход</div>`;
        }
        
        // --- Запуск ---
        window.onload = () => {
            initMap();
            subscribeSignals();
            loadUserProfile();
            initUI();
            fillPlaceholders();
        };
    </script>
</head>
<body>
    <div id="map"></div>
    <div class="app-ui">
        <div class="top-bar">
            <div class="user-greeting" id="greeting">👤 Загрузка...</div>
            <div class="menu-btn" id="menuBtn">☰</div>
        </div>
        <!-- Боковое меню -->
        <div class="side-menu" id="sideMenu">
            <div class="close-menu" id="closeMenu">✖️</div>
            <div class="menu-item" id="menuProfile"><span class="emoji">👤</span> Профиль</div>
            <div class="menu-item" id="menuInventory"><span class="emoji">🎒</span> Инвентарь</div>
            <div class="menu-item" id="menuFactions"><span class="emoji">⚔️</span> Фракции</div>
            <div class="menu-item" id="menuRating"><span class="emoji">🏆</span> Рейтинг</div>
            <div class="menu-item" id="menuQuests"><span class="emoji">📋</span> Задания</div>
            <div class="menu-item" id="menuCollections"><span class="emoji">🖼️</span> Коллекции</div>
            <div class="menu-item" id="menuLore"><span class="emoji">📖</span> Лор</div>
            <div class="menu-item" id="menuEvents"><span class="emoji">🎪</span> События</div>
            <div class="menu-item" id="menuShop"><span class="emoji">🛒</span> Магазин</div>
            <div class="menu-item" id="menuSettings"><span class="emoji">⚙️</span> Настройки</div>
        </div>
        
        <!-- Экраны -->
        <div id="profileScreen" class="screen">
            <div class="screen-header"><div class="back-btn">←</div><div class="screen-title">Профиль</div></div>
            <div id="profileContent"></div>
        </div>
        <div id="inventoryScreen" class="screen">
            <div class="screen-header"><div class="back-btn">←</div><div class="screen-title">Инвентарь</div></div>
            <div id="inventoryContent"></div>
        </div>
        <div id="factionsScreen" class="screen">
            <div class="screen-header"><div class="back-btn">←</div><div class="screen-title">Фракции</div></div>
            <div id="factionsContent"></div>
        </div>
        <div id="ratingScreen" class="screen">
            <div class="screen-header"><div class="back-btn">←</div><div class="screen-title">Рейтинг</div></div>
            <div id="ratingList"></div>
        </div>
        <div id="questsScreen" class="screen">
            <div class="screen-header"><div class="back-btn">←</div><div class="screen-title">Задания</div></div>
            <div id="questsContent"></div>
        </div>
        <div id="collectionsScreen" class="screen">
            <div class="screen-header"><div class="back-btn">←</div><div class="screen-title">Коллекции</div></div>
            <div id="collectionsContent"></div>
